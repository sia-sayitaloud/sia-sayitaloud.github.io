<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA — Say It Aloud | Communication & Career Activation</title>
    <meta name="description" content="SIA (Say It Aloud) transforms academic potential into professional presence through stage presence, AI literacy, and corporate-readiness training.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0B1A33;
            --navy-light: #1E2F4D;
            --gold: #C9A24B;
            --gold-bright: #E0BE6F;
            --cream: #F7F4EE;
            --ink: #10141C;
            --ink-soft: #4A5161;
            --line: rgba(201,162,75,0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: var(--cream); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, .serif { font-family: 'Fraunces', serif; }
        a { color: inherit; text-decoration: none; }
        .wrap { max-width: 1180px; margin: 0 auto; padding: 0 32px; }

        /* Video Section */
        .video-container { width: 100%; max-width: 800px; margin: 40px auto; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        video { width: 100%; display: block; }

        /* Navigation & Other Styles (Previous code remains) */
        header { position: sticky; top: 0; z-index: 50; background: rgba(11,26,51,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(201,162,75,0.18); }
        nav.wrap { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; }
        .brand .mark { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.5rem; color: var(--cream); }
        .navlinks { display: flex; gap: 34px; }
        .navlinks a { font-size: 0.85rem; color: #D8DCE6; }
        .hero { background: linear-gradient(180deg, var(--navy) 0%, #0E2140 100%); color: var(--cream); padding: 110px 0 90px; text-align: center; }
        .program-card { background: #fff; padding: 38px 32px; border: 1px solid rgba(11,26,51,0.08); border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <nav class="wrap">
            <div class="brand"><span class="mark">SIA</span></div>
            <div class="navlinks">
                <a href="#about">About</a>
                <a href="#programs">Programs</a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="wrap">
            <h1>Transforming Potential into <em>Presence</em></h1>
            <p class="lede">Master the art of communication and corporate readiness.</p>
            
            <div class="video-container">
                <video controls preload="metadata">
                    <source src="cr.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </section>

</body>
</html>
